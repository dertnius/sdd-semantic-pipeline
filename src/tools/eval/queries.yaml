# Frozen retrieval golden set — DO NOT edit to chase a score.
#
# Authored against the corpus in src/tools/eval/corpus/ BEFORE any enrichment change, so
# the Baseline is honest. Each query lists expected SECTIONS (not chunk_ids):
#   doc      — path relative to src/tools/eval/corpus/ (POSIX)
#   section  — case-insensitive substring of the chunk breadcrumb
#              (omit it for a doc-level matcher: any chunk in that doc counts)
# A retrieved chunk is a hit when its (doc, breadcrumb) satisfies a matcher.
# See src/tools/scripts/eval_retrieval.py and the plan for why section-granularity.
#
# Categories:
#   cross-reference — service/event/dependency questions; the queries the
#                     depends_on/exposes enrichment is SUPPOSED to help. Lift here
#                     is the point of the overhaul.
#   paraphrase      — query wording deliberately differs from the section text;
#                     tests dense/semantic retrieval.
#   lexical-control — straightforward keyword queries that already work today;
#                     these must NOT regress when enrichment lands.
#
# Note: matchers for non-SAD docs are sometimes doc-level (no `section:`) — an
# honest "the answer is in this document" label where finer labelling wasn't done.

queries:
  # ── cross-reference (entity / dependency surface) ───────────────────────────
  - id: xref-order-created-consumers
    text: "Which services consume the order.created event?"
    category: cross-reference
    expected:
