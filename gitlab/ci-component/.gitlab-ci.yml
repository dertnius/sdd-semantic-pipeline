# CI for the `ci-components` project itself: smoke-test the python-nexus, docx-to-chunks,
# validate-skills, and sharepoint-download components at the current commit, then publish a
# Catalog release on a semver tag.
#
# Prerequisites in the GitLab project:
#   * Settings → CI/CD → "CI/CD Catalog resource" toggled ON (needs a description + README).
#   * GROUP CI/CD variables NEXUS_DOCKER_REGISTRY / NEXUS_PYPI_INDEX_URL / NEXUS_PANDOC_URL.
stages:
  - test
  - validate
  - release

# Self-include the components at THIS commit (works regardless of the project's path) so the
# smoke tests exercise the real fragments/jobs before any tag is cut.
#   * python-nexus  — provides the image + .nexus-* fragments the test jobs compose.
#   * validate-skills — its `validate:skills` job IS the selftest: pointed at the committed
#     valid fixture (templates/validate-skills/examples/skills), it must pass. Both
#     components default to the same Nexus python image, so the merged `default:` is benign.
include:
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/python-nexus@$CI_COMMIT_SHA
    inputs:
      python_version: "3.11"
      pandoc_version: "3.5"
  - component: $CI_SERVER_FQDN/$CI_PROJECT_PATH/validate-skills@$CI_COMMIT_SHA
    inputs:
      skills_dir: "templates/validate-skills/examples/skills"

component-selftest:
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push"'
  before_script:
    - !reference [.nexus-pip-bootstrap, before_script]
    - !reference [.nexus-install-pandoc, before_script]
  script:
    - python --version
    - pandoc --version | head -1
    - python -m pip install --quiet typer       # trivial Nexus-proxied pip install
    - echo "python-nexus smoke OK"

# Smoke-test the docx-to-chunks LINUX path end-to-end: install the pipeline, generate a
# tiny German .docx with pandoc (no committed binary fixture), then convert -> export ->
# index --lexical and assert chunks + index landed. The Windows `prepare` stage can only
# run on a tagged Windows+Word runner, so it is out of scope here.
# allow_failure: this exercises the component's real prerequisite — `sdd-pipeline`
# installable from the Nexus PyPI proxy. It stays non-blocking until that package is
# published; flip to false once it is.
docx-to-chunks-selftest:
  stage: test
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push"'
  variables:
    PIPELINE_INBOX_DIR: "$CI_PROJECT_DIR/inbox"
    PIPELINE_OUTBOX_DIR: "$CI_PROJECT_DIR/outbox"
    PIPELINE_ENFORCE_WORKSPACE: "true"
    PYTHONUTF8: "1"
  before_script:
    - !reference [.nexus-pip-bootstrap, before_script]
    - !reference [.nexus-install-pandoc, before_script]
    - pip install --quiet "sdd-pipeline[lang]"   # the component's default pipeline_install
  script:
    - mkdir -p inbox
    - |
      cat > /tmp/fixture.md <<'EOF'
      # Architektur Entscheidung

      Dieses Dokument beschreibt eine Architektur Entscheidung fuer den Selbsttest
      und ihre Konsequenzen fuer das System.

      ## Sicherheit

      Die Loesung muss die Sicherheitsanforderungen erfuellen. Die
      Authentifizierung erfolgt zentral.
      EOF
    - pandoc /tmp/fixture.md -o inbox/sample.docx
    - sdd-pipeline check
    - sdd-pipeline convert-docx
    - sdd-pipeline export outbox/md --lang de --merge-prose --jobs 0
    - sdd-pipeline index outbox/md --lexical --lang de
    - test -n "$(find outbox/chunks -name '*.chunks.json' 2>/dev/null)" || { echo 'no chunks produced'; exit 1; }
    - test -d outbox/index || { echo 'no index produced'; exit 1; }
    - echo "docx-to-chunks smoke OK"

# Smoke-test the sharepoint-download component: a PowerShell-parse check of the canonical
# downloader (catches syntax breaks). The live SharePoint/Vault path needs a real tenant +
# Vault, so it is out of scope here; the script's pure helpers are unit-tested by the main
# repo's Pester suite (tests/download-sharepoint.Tests.ps1 via the `verify:pester` job).
sharepoint-download-selftest:
  stage: test
  image: "${NEXUS_DOCKER_REGISTRY}/dotnet/powershell:7.4-debian-12"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push"'
  script:
    - pwsh -NoProfile -Command "[ScriptBlock]::Create((Get-Content -Raw ./scripts/download-sharepoint.ps1)) | Out-Null; 'download-sharepoint.ps1 parses OK'"

# Publishing a Release in a Catalog-flagged project auto-publishes that version to the
# CI/CD Catalog. CAVEAT: the public registry.gitlab.com/gitlab-org/release-cli image is
# usually unreachable air-gapped — mirror it into Nexus (shown) or POST the Releases API
# from the Nexus python image with $CI_JOB_TOKEN.
release:
  stage: release
  rules:
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/'
  image: "${NEXUS_DOCKER_REGISTRY}/gitlab-org/release-cli:latest"
  script:
    - echo "Releasing ci-components $CI_COMMIT_TAG (python-nexus + docx-to-chunks + validate-skills + sharepoint-download) to the CI/CD Catalog"
  release:
    tag_name: "$CI_COMMIT_TAG"
    description: "ci-components $CI_COMMIT_TAG — python-nexus (Nexus image + pip proxy + runtime pandoc), docx-to-chunks (Word docs -> chunks + lexical index), validate-skills (offline SKILL.md / Agent-Skills validation), and sharepoint-download (SharePoint folders -> inbox via PnP + Vault)."
