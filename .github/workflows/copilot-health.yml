# Copilot + Agent-Skill integration health gate, for GitHub-hosted mirrors.
# Two deterministic, model-free batteries (mirrored in the GitLab `verify:quality` stage,
# so either host fails CI on drift):
#   * check_copilot.py — Copilot assets valid + wired (frontmatter, CLI/MCP refs, links).
#   * run_skill_evals.py — the Agent Skills' deterministic (fast-lane) evals: each skill's
#     vendored scripts run on committed fixtures and the structural assertions in
#     <skill>/evals/evals.json are code-graded.
# Both are fast (no pandoc / no embedding model / no mcp SDK) and self-tested by pytest.
name: copilot-health

on:
  pull_request:
    paths:
      - ".github/prompts/**"
      - ".github/agents/**"
      - ".github/instructions/**"
      - ".github/copilot-instructions.md"
      - ".vscode/mcp.json"
      - ".claude/skills/**"
      - "src/sdd_pipeline/cli.py"
      - "src/sdd_pipeline/mcp_server.py"
      - "src/tools/scripts/check_copilot.py"
      - "src/tools/scripts/run_skill_evals.py"
      - "tests/test_run_skill_evals.py"
  push:
    branches: [main]
    paths:
      - ".github/prompts/**"
      - ".github/agents/**"
      - ".github/instructions/**"
      - ".github/copilot-instructions.md"
      - ".vscode/mcp.json"
      - ".claude/skills/**"
      - "src/sdd_pipeline/cli.py"
      - "src/sdd_pipeline/mcp_server.py"
      - "src/tools/scripts/check_copilot.py"
      - "src/tools/scripts/run_skill_evals.py"
      - "tests/test_run_skill_evals.py"

jobs:
  copilot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (the package supplies the live CLI surface the gate reads)
        run: pip install -e ".[dev]"
      - name: Copilot asset health (valid + wired to real code)
        run: python src/tools/scripts/check_copilot.py
      - name: Copilot gate self-test
        run: pytest tests/test_check_copilot.py -q
      - name: Skill evals (deterministic, fast lane)
        run: python src/tools/scripts/run_skill_evals.py
      - name: Skill-eval harness self-test
        run: pytest tests/test_run_skill_evals.py -q
