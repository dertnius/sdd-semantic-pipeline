# Conda / micromamba environment for sdd-semantic-pipeline
#
# Create:
#   conda env create -f environment.yml        (Anaconda/Miniconda)
#   micromamba env create -f environment.yml   (micromamba)
#
# Activate:
#   conda activate sdd-pipeline
#   micromamba activate sdd-pipeline
#
# Update after pulling changes:
#   conda env update -f environment.yml --prune
#   micromamba env update -f environment.yml --prune
#
# Install the local package in editable mode (once, after activation):
#   pip install -e ".[dev]"

name: sdd-pipeline

channels:
  - conda-forge          # primary: has pandoc binary + many ML deps
  - defaults

dependencies:
  # ── Runtime ────────────────────────────────────────────────────────────────
  - python=3.11
  - pandoc>=3.1          # system binary — critical; must come from conda-forge
  - pip>=24

  # ── pip-installed Python packages ─────────────────────────────────────────
  # We use pip for everything Python so version resolution is predictable and
  # we stay compatible with PyPI-only packages (sentence-transformers, chromadb).
  - pip:
    # Core pipeline
    - panflute>=2.3
    - langchain-core>=0.3
    - sentence-transformers>=3.0
    - pydantic>=2.6
    - pydantic-settings>=2.2
    - typer>=0.12
    - rich>=13.7

    # Optional chroma backend (dev keeps it so the chroma tests run)
    - chromadb>=0.5

    # Dev / test
    - pytest>=8.1
    - pytest-cov>=5.0
    - pytest-mock>=3.14
    - ruff>=0.4
    - mypy>=1.9

    # Local package (editable)
    - -e .
