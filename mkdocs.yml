site_name: SDD Semantic Pipeline
site_description: >-
  Confluence/HTML/docx → Markdown converter + local semantic search over SDD/ADR docs.
docs_dir: docs
# `mkdocs build` emits ./site (gitignored). `mkdocs serve` runs the live-reload site.
# Emit real <page>.html files (not pretty <page>/ directory URLs) so the built site
# is browsable by double-clicking over file:// — directory URLs only resolve under a
# web server and otherwise render as a bare folder listing.
# Combined with the `offline` plugin below, the built ./site is also *searchable*
# straight from disk over file:// (open ./site/index.html) — Material's client-side
# search normally needs an HTTP server, but `offline` ships the index as a JS file
# loaded behind an iframe-worker shim so no Fetch API call is made.
use_directory_urls: false

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - include-markdown
  # Makes full-text search work when ./site is opened directly over file:// (no
  # server): it moves the search index to a JS file and uses an iframe-worker shim
  # to bypass the Fetch API, which browsers block from a file:// origin. Built into
  # mkdocs-material; must come after `search`; auto-sets use_directory_urls:false.
  # Default-on via the toggle so a plain `mkdocs build` + double-click is searchable;
  # `OFFLINE=false mkdocs build` produces a vanilla online build instead.
  - offline:
      enabled: !ENV [OFFLINE, true]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true

# Kept in the repo for history / other workflows but out of the built site (so they
# don't trip the orphan-page check below):
#  - archive/  : superseded/working notes
#  - inbox/    : the Copilot wiki-ingestion drop-zone (see .github/copilot-instructions.md)
#  - notes/    : completed spike notes
#  - the single superseded storage-format guide (the canonical spec is
#    confluence-conversion-rules.md)
exclude_docs: |
  archive/
  inbox/
  notes/
  guides/confluence-storage-format-gitlab-markdown.md
  # Static renders that collide with their rendered .md page (use_directory_urls:false
  # builds <name>.md -> <name>.html). The interactive decks (…-presentation*.html) have
  # no .md twin and are kept as standalone static assets.
  presentation/README.html
  presentation/sdd-pipeline-overview.html

# Link integrity is enforced by src/tools/scripts/check_docs.py (it resolves links
# to source files on disk, which mkdocs can't). Relax mkdocs link validation so the
# included repo-root README/CLAUDE source-file links don't fail --strict; keep nav /
# orphan-page validation strict so `mkdocs build --strict` still guards site structure.
validation:
  links:
    not_found: ignore
    anchors: ignore
    absolute_links: ignore
    unrecognized_links: ignore
  nav:
    omitted_files: warn
    not_found: warn

