# ── GitLab CI/CD for the SDD semantic pipeline ───────────────────────────────
#
# Flow: (download) → convert → lint → export | index --lexical → publish.
# The DEFAULT pipeline is MODEL-FREE: it converts, lints, and builds a vectorless
# lexical index that developers pull for Copilot's local MCP server (no embedding model
# anywhere). The download stage is OPTIONAL and only runs on the scheduled "refresh"
# pipeline or when triggered manually — commit/MR pipelines operate on files already
# in inbox/ and never touch SiteMinder.
#
# Inbox is populated three ways (see `before_script` of `download` / per-job notes):
#   1. committed under inbox/**          (default for commit/MR)
#   2. uploaded as an upstream artifact  (artifacts:paths: [inbox/])
#   3. fetched by `sdd-pipeline download` behind SiteMinder (scheduled/manual only)
#
# Secrets (masked CI/CD variables, never in this file):
#   PIPELINE_DOWNLOAD_COOKIE   pre-issued SMSESSION cookie (primary auth)
#   (or PIPELINE_DOWNLOAD_USERNAME/_PASSWORD/_LOGIN_URL for form login)
#   PIPELINE_AZURE_OPENAI_API_KEY  only if a semantic (provider=azure) index is built.
#
# SharePoint ingestion via PnP PowerShell (`download:sharepoint`, OPTIONAL):
#   The SharePoint credential is NOT a CI variable — it is read at run time from HashiCorp
#   Vault via a secretless OIDC ID token (id_tokens -> Vault JWT auth -> KV). The job exports
#   SHAREPOINT_CLIENT_SECRET in-script; it is never declared here and never echoed.
#   Non-secret CI variables (set per project): SHAREPOINT_MANIFEST, SHAREPOINT_CLIENT_ID,
#     SHAREPOINT_TENANT, SHAREPOINT_AUTH_MODE, VAULT_ADDR, VAULT_JWT_ROLE,
#     VAULT_SECRET_PATH, VAULT_SECRET_FIELD.
#   Extra GROUP variables: NEXUS_VAULT_URL (vault CLI binary in a Nexus raw repo),
#     NEXUS_PSGALLERY_URL (PowerShell-Gallery proxy for PnP.PowerShell + powershell-yaml).

stages:
  - verify
  - download
  - convert
  - index
  - publish
  - pages

# CI bootstrap — the stock python:3.x-slim from the enterprise Nexus registry, pip pinned
# to the Nexus PyPI proxy, and the runtime pandoc install — is provided by the shared
# `python-nexus` CI/CD Component (source scaffolded under gitlab/ci-component/). It supplies
# `default: image`, `default: cache` (pip + pandoc binary), the pip/pandoc `variables:`, and
# the hidden fragments `.nexus-pip-bootstrap` / `.nexus-install-pandoc` referenced by the
# jobs below. The NEXUS_* endpoints are inherited GROUP-level CI/CD variables. Pin the
# component to an exact tag; bump deliberately. Fill in <group> for your instance.
include:
  - component: $CI_SERVER_FQDN/<group>/ci-components/python-nexus@1.0.0
    inputs:
      python_version: "3.11"
      pandoc_version: "3.5"

variables:
  PIPELINE_INBOX_DIR: "$CI_PROJECT_DIR/inbox"
  PIPELINE_OUTBOX_DIR: "$CI_PROJECT_DIR/outbox"
  PIPELINE_ENFORCE_WORKSPACE: "true"
  PIPELINE_LANGUAGE: "auto"            # per-document EN/DE/FR/IT detection ([lang] extra)
  PYTHONUTF8: "1"                      # Windows-safe; harmless on Linux runners
  ANONYMIZED_TELEMETRY: "false"
  HF_HOME: "$CI_PROJECT_DIR/.cache/huggingface"   # used only by index:semantic (model path)

# ── verify: code + docs quality gate (lint, types, fast tests, doc-health) ────
# Runs on merge requests and on branch pushes that touch code/docs/Copilot assets.
# Two deterministic batteries guard drift, both model-free:
#   * check_docs.py + `mkdocs build --strict` — docs *not broken* (links/render) AND
#     *updated* (CLI/config/citation coverage);
#   * check_copilot.py — the GitHub Copilot assets (.github/prompts, /agents,
#     /instructions, copilot-instructions.md, .vscode/mcp.json) are valid frontmatter
#     and wired to real CLI commands / MCP tools / links.
# A stale or broken doc or Copilot asset fails the pipeline and cannot merge.
verify:quality:
  stage: verify
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push"'
      changes: ["src/**/*", "tests/**/*", "docs/**/*", "README.md", "CLAUDE.md", "pyproject.toml", "mkdocs.yml", ".github/**/*", ".vscode/mcp.json", ".claude/skills/**/*"]
  before_script:
    - !reference [.nexus-pip-bootstrap, before_script]
    - pip install -e ".[dev,docs]"
  script:
    - ruff format --check src/ tests/
    - ruff check src/ tests/
    - pytest -m "not slow"
    - python src/tools/scripts/check_docs.py          # docs not broken AND updated
    - python src/tools/scripts/check_copilot.py        # Copilot assets valid AND wired
    - python -m mkdocs build --strict                 # nav / render / orphans
  artifacts:
    when: on_failure
    paths:
      - site/
    expire_in: 1 day

# Type-check is informational for now (the core has pre-existing mypy debt unrelated
# to docs); surfaced but non-blocking so it never red-gates the docs/quality pipeline.
verify:types:
  stage: verify
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push"'
      changes: ["src/**/*", "pyproject.toml"]
  allow_failure: true
  before_script:
    - !reference [.nexus-pip-bootstrap, before_script]
    - pip install -e ".[dev]"
  script:
    - mypy src/

# ── verify: Pester unit tests for the PowerShell scripts (model-free) ─────────
# Unit-tests the pure helpers of scripts/download-sharepoint.ps1 (manifest parse, inbox-safe
# local-path mapping, extension filter, report shape) with the PnP cmdlets mocked — no network,
# no tenant. Runs on a pwsh image; Pester + powershell-yaml come from the Nexus PS-Gallery proxy.
verify:pester:
  stage: verify
  image: "${NEXUS_DOCKER_REGISTRY}/dotnet/powershell:7.4-debian-12"
  cache: []                                   # opt out of the Linux pip/pandoc default cache
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push"'
      changes: ["gitlab/ci-component/scripts/*.ps1", "tests/*.Tests.ps1"]
  before_script:
    - pwsh -NoProfile -Command "Register-PSRepository -Name Nexus -SourceLocation '$NEXUS_PSGALLERY_URL' -InstallationPolicy Trusted -ErrorAction SilentlyContinue; Install-Module Pester, powershell-yaml -Repository Nexus -Scope CurrentUser -Force"
  script:
    - pwsh -NoProfile -Command "Invoke-Pester -Path tests -CI"

# ── reusable before_script fragment: vault CLI on PATH from a Nexus raw repo ───
# Mirrors python-nexus's runtime pandoc install: no custom image, fetch the pinned `vault`
# binary from NEXUS_VAULT_URL and cache it on PATH. Used by download:sharepoint.
.install-vault:
  before_script:
    - mkdir -p "$CI_PROJECT_DIR/.cache/bin" && export PATH="$CI_PROJECT_DIR/.cache/bin:$PATH"
    - command -v vault >/dev/null 2>&1 || { curl -fsSL "$NEXUS_VAULT_URL" -o "$CI_PROJECT_DIR/.cache/bin/vault" && chmod 0755 "$CI_PROJECT_DIR/.cache/bin/vault"; }
    - vault version

# ── download (OPTIONAL: scheduled refresh or manual only) ─────────────────────
download:
  stage: download
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'      # manual "Run pipeline"
      when: manual
      allow_failure: false
  before_script:
    - !reference [.nexus-pip-bootstrap, before_script]
    - pip install -e ".[download]"            # requests — SiteMinder-aware ingestion
  script:
    # PIPELINE_DOWNLOAD_COOKIE (or form-login vars) come from masked CI/CD variables.
    - sdd-pipeline download inbox/manifest.yaml --auth cookie
    # Plain un-gated URL alternative:
    #   curl -fsSL "$SOME_URL" -o inbox/confluence/page.html
  artifacts:
    paths:
      - inbox/
    expire_in: 1 day

# ── download:sharepoint (OPTIONAL: PnP PowerShell, Vault OIDC) ─────────────────
# Downloads SharePoint Online folders (config/sharepoint-manifest.yaml) into inbox/sharepoint/
# via PnP.PowerShell. GitLab authenticates to Vault with a secretless OIDC ID token, reads the
# SharePoint secret from KV, then connects. Coexists with `download` (independent ingestion).
# NOTE: SHAREPOINT_AUTH_MODE=secret is legacy ACS app-only (retired 2026-04-02) — set it to
# `certificate` (Entra app + cert) or `managedidentity` in a current tenant. See
# gitlab/ci-component/templates/sharepoint-download/README.md.
download:sharepoint:
  stage: download
  image: "${NEXUS_DOCKER_REGISTRY}/dotnet/powershell:7.4-debian-12"   # PowerShell 7 on Linux
  timeout: 30m
  id_tokens:
    VAULT_ID_TOKEN:
      aud: "$VAULT_ADDR"          # MUST equal the Vault JWT role's bound_audiences
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'      # manual "Run pipeline"
      when: manual
      allow_failure: false
  variables:
    SHAREPOINT_MANIFEST: "config/sharepoint-manifest.yaml"
    SHAREPOINT_CLIENT_ID: ""        # Entra/ACS app id (NOT a secret)
    SHAREPOINT_TENANT: ""           # contoso.onmicrosoft.com (certificate mode)
    SHAREPOINT_AUTH_MODE: "secret"  # secret | certificate | managedidentity
    VAULT_ADDR: ""                  # https://vault.corp.example.com
    VAULT_JWT_ROLE: "sdd-sharepoint"
    VAULT_SECRET_PATH: "secret/sharepoint/sdd"   # `vault kv get` path (no /data/ infix)
    VAULT_SECRET_FIELD: "client_secret"
  before_script:
    - !reference [.install-vault, before_script]
    - pwsh -NoProfile -Command "Register-PSRepository -Name Nexus -SourceLocation '$NEXUS_PSGALLERY_URL' -InstallationPolicy Trusted -ErrorAction SilentlyContinue; Install-Module PnP.PowerShell, powershell-yaml -Repository Nexus -Scope CurrentUser -Force -AllowClobber"
  script:
    # OIDC -> Vault token -> SharePoint secret (env-only; never echoed).
    - export VAULT_TOKEN="$(vault write -field=token auth/jwt/login role=$VAULT_JWT_ROLE jwt=$VAULT_ID_TOKEN)"
    - export SHAREPOINT_CLIENT_SECRET="$(vault kv get -field=$VAULT_SECRET_FIELD $VAULT_SECRET_PATH)"
    # certificate mode also needs: SHAREPOINT_CERT_BASE64 (+ SHAREPOINT_CERT_PASSWORD) from Vault.
    - pwsh -NoProfile -File gitlab/ci-component/scripts/download-sharepoint.ps1 -Manifest "$SHAREPOINT_MANIFEST" -AuthMode "$SHAREPOINT_AUTH_MODE" -ClientId "$SHAREPOINT_CLIENT_ID" -Tenant "$SHAREPOINT_TENANT"
  artifacts:
    paths:
      - inbox/
    expire_in: 1 day

# ── convert: HTML + docx → Markdown (model-free, parallel) ────────────────────
convert:
  stage: convert
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - changes: [inbox/**/*, config/**/*, .gitlab-ci.yml]
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  before_script:
    - !reference [.nexus-pip-bootstrap, before_script]
    - !reference [.nexus-install-pandoc, before_script]
    - pip install -e ".[lang]"                # base package + --lang auto detection
    - sdd-pipeline check                      # fail fast if pandoc/deps didn't install
  script:
    - sdd-pipeline convert                    # HTML → md (per-file; pandoc-bound)
    - sdd-pipeline convert-docx               # docx → md
    - sdd-pipeline lint outbox/md --strict    # quality gate over the converted corpus
  artifacts:
    paths:
      - outbox/md/
      - outbox/reports/
    expire_in: 1 week

# ── index: MODEL-FREE lexical index (DEFAULT) ─────────────────────────────────
# Builds a vectorless index Copilot can search via the local MCP server in lexical mode.
index:lexical:
  stage: index
  needs: ["convert"]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - changes: [inbox/**/*, config/**/*, .gitlab-ci.yml]
  before_script:
    - !reference [.nexus-pip-bootstrap, before_script]
    - !reference [.nexus-install-pandoc, before_script]
    - pip install -e ".[lang]"
  script:
    - sdd-pipeline export outbox/md --lang auto --jobs 0       # portable .chunks.json artifacts
    - sdd-pipeline index outbox/md --lexical --lang auto       # vectorless index → outbox/index
  artifacts:
    paths:
      - outbox/index/      # devs pull this for the local MCP server (scripts/pull-index.*)
      - outbox/chunks/
    expire_in: 1 week

# ── index: SEMANTIC (OPTIONAL, manual) — Azure multilingual embeddings ────────
# Flip to dense multilingual search. Needs PIPELINE_AZURE_OPENAI_* masked variables and
# an Azure text-embedding-3-large deployment. bge-m3 (local) is the air-gapped alternative.
index:semantic:
  stage: index
  needs: ["convert"]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
      allow_failure: true
  variables:
    PIPELINE_EMBEDDING_PROVIDER: "azure"
  # Job-scoped cache: overrides the component's default cache for THIS job only, adding the
  # HuggingFace cache (model path) while preserving the shared pip + pandoc caches.
  cache:
    - { key: "sdd-${CI_COMMIT_REF_SLUG}", paths: [.cache/pip] }
    - { key: "pandoc-${PANDOC_VERSION}",  paths: [.cache/bin] }
    - { key: "hf-${CI_COMMIT_REF_SLUG}",  paths: [.cache/huggingface] }
  before_script:
    - !reference [.nexus-pip-bootstrap, before_script]
    - !reference [.nexus-install-pandoc, before_script]
    - pip install -e ".[azure,lang]"
  script:
    - sdd-pipeline index outbox/md --provider azure --lang auto
  artifacts:
    paths:
      - outbox/index/
    expire_in: 1 week

# ── publish: expose the index + reports for consumers ─────────────────────────
publish:
  stage: publish
  needs: ["index:lexical"]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - changes: [inbox/**/*, config/**/*, .gitlab-ci.yml]
  script:
    - echo "Index + reports published as artifacts; pull with scripts/pull-index.*"
  artifacts:
    name: "sdd-index-$CI_COMMIT_SHORT_SHA"
    paths:
      - outbox/index/
      - outbox/reports/
    expire_in: 30 days

# ── pages: publish the MkDocs site as GitLab Pages ────────────────────────────
# GitLab serves the `public/` artifact of a job named `pages` at
# https://<namespace>.gitlab.io/<project>/. The same `mkdocs build --strict` the
# verify stage runs as a *check* is run here to *render* into public/ on the default
# branch. Model-free (the `[docs]` extra: mkdocs-material — no pandoc, no model).
# Links are relative + `use_directory_urls: false`, so the site is correct under the
# Pages sub-path. Independent of the corpus pipeline (mkdocs ignores the workspace
# guard). `needs: []` so it doesn't wait on convert/index.
pages:
  stage: pages
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes: ["docs/**/*", "mkdocs.yml", "README.md", "CLAUDE.md", "src/**/*"]
  before_script:
    - !reference [.nexus-pip-bootstrap, before_script]
    - pip install -e ".[docs]"
  script:
    - mkdocs build --strict --site-dir public
  artifacts:
    paths:
      - public
    expire_in: 30 days
